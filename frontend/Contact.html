<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - ParkSmart</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-gray-900 via-blue-900 to-gray-900 text-white">

  <!-- Container -->
  <div class="flex w-full max-w-6xl bg-gray-800 rounded-lg shadow-2xl overflow-hidden">

    <!-- Left -->
    <div class="w-1/2 bg-blue-900 p-10 flex flex-col justify-center">
      <h2 class="text-4xl font-bold mb-6">Contact Us</h2>

      <p class="text-gray-300 mb-6">
        Have questions or need help? Reach out to ParkSmart support.
      </p>

      <div class="space-y-4 text-gray-300">
        <p><i class="fas fa-map-marker-alt text-blue-400 mr-2"></i> GTMC Vishnupuri, Nanded</p>
        <p><i class="fas fa-phone text-blue-400 mr-2"></i> +91 9876543210</p>
        <p><i class="fas fa-envelope text-blue-400 mr-2"></i> parksmart@gmail.com</p>
      </div>
    </div>

    <!-- Right (Form) -->
    <div class="w-1/2 p-10">

      <h3 class="text-2xl font-semibold mb-6">
        <i class="fas fa-paper-plane text-blue-400 mr-2"></i> Send Message
      </h3>

      <form onsubmit="saveMessage(event)" class="space-y-5">

        <!-- Name -->
        <div>
          <label class="text-gray-400 text-sm">Name</label>
          <input type="text" id="name" placeholder="Enter your name"
            class="w-full mt-1 px-4 py-2 bg-gray-700 rounded outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <!-- Email -->
        <div>
          <label class="text-gray-400 text-sm">Email</label>
          <input type="email" id="email" placeholder="Enter your email"
            class="w-full mt-1 px-4 py-2 bg-gray-700 rounded outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <!-- Message -->
        <div>
          <label class="text-gray-400 text-sm">Message</label>
          <textarea id="message" rows="4" placeholder="Your message..."
            class="w-full mt-1 px-4 py-2 bg-gray-700 rounded outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <!-- Button -->
        <button type="submit"
          class="w-full bg-blue-600 py-2 rounded font-semibold hover:bg-blue-700 transition">
          Submit
        </button>

        <!-- Status -->
        <p id="status" class="text-sm"></p>

      </form>

      <p class="text-sm text-gray-400 mt-6">
        Back to 
        <a href="index.html" class="text-blue-400 hover:underline">Home</a>
      </p>

    </div>

  </div>

  <!-- JavaScript -->
  <script>
    async function saveMessage(event) {
      event.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const message = document.getElementById("message").value;
      const status = document.getElementById("status");

      if (!name || !email || !message) {
        status.className = "text-red-400";
        status.innerText = "Please fill all fields";
        return;
      }

      try {
        const res = await fetch("http://127.0.0.1:5000/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, message })
        });

        const data = await res.json();

        if (data.success) {
          status.className = "text-green-400";
          status.innerText = "Message saved successfully ✅";

          // clear form
          document.getElementById("name").value = "";
          document.getElementById("email").value = "";
          document.getElementById("message").value = "";

        } else {
          status.className = "text-red-400";
          status.innerText = "Failed to save message ❌";
        }

      } catch (error) {
        status.className = "text-red-400";
        status.innerText = "Server error ❌";
      }
    }
  </script>

</body>
</html>
