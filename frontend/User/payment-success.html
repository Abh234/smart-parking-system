<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Success</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: "Poppins", sans-serif; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-100 to-emerald-200 flex items-center justify-center p-6">

<div class="bg-white rounded-3xl shadow-2xl p-10 max-w-2xl w-full">
  <div class="text-center">
    <div class="w-20 h-20 mx-auto rounded-full bg-green-100 flex items-center justify-center text-4xl text-green-700">✓</div>
    <h1 class="text-4xl font-bold text-green-700 mt-4">Payment Successful</h1>
    <p class="text-gray-600 mt-2">Booking saved, payment saved, and slot blocked successfully.</p>
  </div>

  <div class="mt-8 bg-slate-50 rounded-2xl p-6 space-y-4">
    <div class="flex justify-between border-b pb-2"><span>Booking ID</span><span id="bookingId">-</span></div>
    <div class="flex justify-between border-b pb-2"><span>Slot Name</span><span id="slotName">-</span></div>
    <div class="flex justify-between border-b pb-2"><span>Amount Paid</span><span id="amountPaid">-</span></div>
    <div class="flex justify-between border-b pb-2"><span>Payment Reference</span><span id="paymentId">-</span></div>
    <div class="flex justify-between"><span>Method</span><span id="paymentMethod">-</span></div>
  </div>

  <div class="mt-8 grid sm:grid-cols-2 gap-4">
    <a href="manage_bookings.html" class="text-center bg-blue-600 text-white py-3 rounded-xl font-semibold">Go To My Bookings</a>
    <a href="dashboard.html" class="text-center bg-gray-600 text-white py-3 rounded-xl font-semibold">Back To Dashboard</a>
  </div>
</div>

<script>
const payment = JSON.parse(localStorage.getItem("latestPayment") || "{}");
document.getElementById("bookingId").innerText = payment.booking_id || "-";
document.getElementById("slotName").innerText = payment.slot_name || "-";
document.getElementById("amountPaid").innerText = payment.amount_paid ? `Rs. ${Number(payment.amount_paid).toFixed(2)}` : "-";
document.getElementById("paymentId").innerText = payment.payment_id || "-";
document.getElementById("paymentMethod").innerText = payment.payment_method || "phonepe_manual";
</script>
</body>
</html>
