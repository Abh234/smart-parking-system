<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book Parking Slot</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {
  font-family: "Poppins", sans-serif;
}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-600 via-blue-500 to-cyan-400 flex items-center justify-center min-h-screen">

<div class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-2xl p-8 w-full max-w-md">
  <h2 class="text-3xl font-bold text-center mb-5 text-gray-800">
    Confirm Booking
  </h2>

  <div class="mb-5 text-center bg-blue-50 p-3 rounded-lg">
    <p id="slotInfo" class="text-blue-700 font-semibold"></p>
  </div>

  <label class="text-sm font-semibold text-gray-600">Vehicle Type</label>
  <select id="vehicleType"
    class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-blue-400 outline-none">
    <option value="">Select Vehicle Type</option>
    <option value="Car">Car</option>
    <option value="Bike">Bike</option>
    <option value="Truck">Truck</option>
    <option value="Other">Other</option>
  </select>

  <label class="text-sm font-semibold text-gray-600">Vehicle Number</label>
  <input type="text" id="vehicleNumber"
    placeholder="e.g. MH12AB1234"
    class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-blue-400 outline-none"/>

  <label class="text-sm font-semibold text-gray-600">Date</label>
  <input type="date" id="date"
    class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-blue-400"/>

  <label class="text-sm font-semibold text-gray-600">Start Time</label>
  <input type="time" id="time"
    class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-blue-400"/>

  <label class="text-sm font-semibold text-gray-600">Duration (Hours)</label>
  <input type="number" id="hours"
    placeholder="Enter Hours"
    class="w-full p-3 border rounded-lg mb-5 focus:ring-2 focus:ring-blue-400"/>

  <button onclick="goToPayment()"
    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:scale-105 transition">
    Book Now
  </button>

  <button onclick="goBack()"
    class="w-full mt-3 bg-gray-500 text-white py-2 rounded-lg hover:bg-gray-700 transition">
    Back
  </button>
</div>

<script>
const email = localStorage.getItem("email");
const params = new URLSearchParams(window.location.search);
const slotId = params.get("s");
const price = params.get("p");

if (!email) {
  alert("Please login first");
  window.location.href = "../login.html";
}

if (!slotId || !price) {
  alert("Invalid slot selection");
  window.location.href = "slot_booking.html";
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("slotInfo").innerText =
    "Slot ID: " + slotId + " | Price: Rs. " + price;

  document.getElementById("date").value =
    new Date().toISOString().split("T")[0];
});

function goToPayment() {
  const vehicleType = document.getElementById("vehicleType").value.trim();
  const vehicleNumber = document.getElementById("vehicleNumber").value.trim().toUpperCase();
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const hours = document.getElementById("hours").value;

  if (!vehicleType || !vehicleNumber || !date || !time || !hours) {
    alert("Please fill all fields");
    return;
  }

  if (Number(hours) <= 0) {
    alert("Enter valid hours");
    return;
  }

  const regex = /^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$/;
  if (!regex.test(vehicleNumber)) {
    alert("Enter valid vehicle number (MH12AB1234)");
    return;
  }

  const bookingData = {
    email: email,
    slot_id: slotId,
    price: price,
    vehicle_type: vehicleType,
    vehicle_number: vehicleNumber,
    date: date,
    start_time: time,
    end_time: calculateEndTime(time, hours),
    hours: hours
  };

  localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
  window.location.href = "payment.html";
}

function calculateEndTime(start, hours) {
  let [h, m] = start.split(":");
  let date = new Date();
  date.setHours(h);
  date.setMinutes(m);
  date.setHours(date.getHours() + parseInt(hours));
  return date.toTimeString().slice(0, 5);
}

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
