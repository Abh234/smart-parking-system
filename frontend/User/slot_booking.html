<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parking Booking System</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: white;
      min-width: 200px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      border-radius: 4px;
    }
    .dropdown:hover .dropdown-content { display: block; }
  </style>
</head>

<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">

<div class="bg-white shadow-md rounded-lg p-6 w-full max-w-4xl">

  <h1 class="text-2xl font-bold text-center mb-4">
    Parking Spot Selection
  </h1>
  <!-- LOCATION DISPLAY WITH ICON -->
<p class="text-center text-gray-600 mb-6">
  📍 Location: <span class="font-semibold">Phoenix Mall of Millennium, Pune</span>
</p>
  <div class="grid grid-cols-10 gap-2" id="parkingSlots"></div>

  <div class="mt-6 flex items-center justify-between">
    <span id="spotPrice" class="text-lg font-semibold">
      Spot Price: Rs. 0
    </span>

    <div>
      <span class="inline-block w-4 h-4 bg-green-500 rounded-full mr-2"></span> Available
      <span class="inline-block w-4 h-4 bg-gray-400 rounded-full mx-2"></span> Booked
      <span class="inline-block w-4 h-4 bg-blue-500 rounded-full mx-2"></span> Selected
    </div>
  </div>

  <div class="mt-8 flex justify-between">
    <button id="backBtn"
      class="bg-gray-500 text-white py-2 px-8 rounded-full">
      Back
    </button>

    <button id="nextBtn"
      class="bg-blue-500 text-white py-2 px-8 rounded-full">
      Book Now
    </button>
  </div>

</div>

<script>

let selectedSlot = null;

// ---------------- PAGE LOAD ----------------
document.addEventListener("DOMContentLoaded", () => {

  const email = localStorage.getItem("email");

  // ✅ LOGIN CHECK
  if (!email || email === "null" || email === "undefined") {
    alert("Please login first");
    window.location.href = "../login.html";
    return;
  }

  fetchSlots();
});


// ---------------- FETCH SLOTS ----------------
async function fetchSlots() {
  try {
    const res = await fetch("http://127.0.0.1:5000/api/slots");
    const data = await res.json();

    const container = document.getElementById("parkingSlots");
    container.innerHTML = "";

    data.forEach(slot => {
      const btn = document.createElement("button");
      btn.innerText = slot.slot_name;

      btn.className = "w-16 h-10 m-2 rounded text-white font-bold";

      // BOOKED SLOT
      if (slot.status === "booked") {
        btn.classList.add("bg-gray-400");
        btn.disabled = true;
      }

      // AVAILABLE SLOT
      else {
        btn.classList.add("bg-green-500");

        btn.onclick = () => {
          selectedSlot = slot;

          // remove previous selection
          document.querySelectorAll("#parkingSlots button")
            .forEach(b => {
              b.classList.remove("bg-blue-500");
              if (!b.disabled) b.classList.add("bg-green-500");
            });

          // highlight selected
          btn.classList.remove("bg-green-500");
          btn.classList.add("bg-blue-500");

          // show price
          document.getElementById("spotPrice").innerText =
            "Spot Price: Rs. " + slot.price;
        };
      }

      container.appendChild(btn);
    });

  } catch (error) {
    console.error(error);
    alert("Error loading slots");
  }
}


// ---------------- NEXT BUTTON (NO BOOKING HERE) ----------------
document.getElementById("nextBtn").onclick = () => {

  if (!selectedSlot) {
    alert("Please select a slot first");
    return;
  }

  // ✅ SEND DATA TO NEXT PAGE
  window.location.href =
    `book_now.html?s=${selectedSlot.slot_id}&p=${selectedSlot.price}`;
};


// ---------------- BACK ----------------
document.getElementById("backBtn").onclick = () => {
  window.history.back();
};

</script>

</body>
</html>
