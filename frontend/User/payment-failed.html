<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: "Poppins", sans-serif; }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-red-100 to-rose-200 flex items-center justify-center p-6">

<div class="bg-white rounded-3xl shadow-2xl p-10 max-w-2xl w-full">
  <div class="text-center">
    <div class="w-20 h-20 mx-auto rounded-full bg-red-100 flex items-center justify-center text-4xl text-red-700">!</div>
    <h1 class="text-4xl font-bold text-red-700 mt-4">Payment Failed</h1>
    <p class="text-gray-600 mt-2">Your booking was not completed.</p>
  </div>

  <div class="mt-8 bg-slate-50 rounded-2xl p-6 space-y-4">
    <div class="flex justify-between border-b pb-2"><span>Status</span><span class="text-red-700 font-semibold">Failed</span></div>
    <div class="flex justify-between"><span>Reason</span><span id="failMessage" class="text-right max-w-[60%] font-semibold">Unknown error</span></div>
  </div>

  <div class="mt-8 grid sm:grid-cols-2 gap-4">
    <a href="payment.html" class="text-center bg-blue-600 text-white py-3 rounded-xl font-semibold">Try Again</a>
    <a href="book_now.html" class="text-center bg-gray-600 text-white py-3 rounded-xl font-semibold">Back To Booking</a>
  </div>
</div>

<script>
const failure = JSON.parse(localStorage.getItem("paymentFailure") || "{}");
document.getElementById("failMessage").innerText = failure.message || "Payment failed";
</script>
</body>
</html>
