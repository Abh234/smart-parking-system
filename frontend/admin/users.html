<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100">
<div class="flex min-h-screen">
  <aside class="w-64 bg-gradient-to-b from-slate-950 via-slate-900 to-blue-950 text-white p-5">
    <h2 class="text-2xl font-bold mb-6 cursor-pointer" onclick="goDashboard()">Admin Panel</h2>
    <ul class="space-y-3">
      <li onclick="goDashboard()" class="hover:bg-white/10 p-3 rounded-xl cursor-pointer">Dashboard</li>
      <li onclick="goUsers()" class="bg-white/10 p-3 rounded-xl cursor-pointer">Manage Users</li>
      <li onclick="goSlots()" class="hover:bg-white/10 p-3 rounded-xl cursor-pointer">Manage Slots</li>
      <li onclick="goAddSlots()" class="hover:bg-white/10 p-3 rounded-xl cursor-pointer">Add Slots</li>
      <li onclick="goBookings()" class="hover:bg-white/10 p-3 rounded-xl cursor-pointer">Bookings</li>
      <li onclick="goPayments()" class="hover:bg-white/10 p-3 rounded-xl cursor-pointer">Payments</li>
      <li onclick="goReports()" class="hover:bg-white/10 p-3 rounded-xl cursor-pointer">Reports</li>
      <li onclick="logout()" class="hover:bg-red-500 p-3 rounded-xl cursor-pointer">Logout</li>
    </ul>
  </aside>

  <main class="flex-1">
    <header class="bg-blue-700 text-white p-5 shadow-lg flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold">Manage Users</h1>
        <p class="text-blue-100 text-sm mt-1">Admin view for registered user records.</p>
      </div>
      <button onclick="loadUsers()" class="bg-white text-blue-700 px-4 py-2 rounded-xl font-semibold">Refresh</button>
    </header>

    <section class="p-6">
      <div class="grid md:grid-cols-3 gap-5 mb-6">
        <div class="bg-white border border-slate-200 rounded-3xl p-5">
          <p class="text-sm text-slate-500">Total Users</p>
          <p id="userCount" class="text-4xl font-bold mt-2">0</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-3xl p-5">
          <p class="text-sm text-slate-500">Search</p>
          <input id="searchInput" type="text" placeholder="Search by name, email, phone"
            class="mt-2 w-full border border-slate-200 rounded-2xl px-4 py-3 outline-none">
        </div>

        <div class="bg-white border border-slate-200 rounded-3xl p-5">
          <p class="text-sm text-slate-500">Status</p>
          <p class="text-lg font-semibold mt-2 text-green-600">Live MySQL Data</p>
          <p class="text-sm text-slate-500 mt-1">Fetched from backend API.</p>
        </div>
      </div>

      <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden">
        <div class="p-5 border-b border-slate-200">
          <h2 class="text-xl font-bold">Registered Users</h2>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-slate-50">
              <tr>
                <th class="p-4">ID</th>
                <th class="p-4">Name</th>
                <th class="p-4">Email</th>
                <th class="p-4">Phone</th>
                <th class="p-4">Role</th>
              </tr>
            </thead>
            <tbody id="userTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
const admin = JSON.parse(localStorage.getItem("admin") || "null");
if (!admin) window.location.href = "admin-login.html";

let users = [];
document.getElementById("searchInput").addEventListener("input", renderUsers);

async function loadUsers() {
  try {
    const res = await fetch("http://127.0.0.1:5000/api/admin/users");
    const data = await res.json();

    if (!data.success) {
      alert(data.message || data.error || "Failed to load users");
      return;
    }

    users = data.users || [];
    document.getElementById("userCount").innerText = users.length;
    renderUsers();
  } catch (error) {
    console.error(error);
    alert("Server error while loading users");
  }
}

function renderUsers() {
  const keyword = document.getElementById("searchInput").value.toLowerCase();

  const filtered = users.filter((user) =>
    [user.id, user.name, user.email, user.phone, user.role]
      .some((value) => String(value || "").toLowerCase().includes(keyword))
  );

  document.getElementById("userTable").innerHTML = filtered.length
    ? filtered.map((user) => `
      <tr class="border-t border-slate-200">
        <td class="p-4">${user.id}</td>
        <td class="p-4 font-semibold text-slate-900">${user.name}</td>
        <td class="p-4">${user.email}</td>
        <td class="p-4">${user.phone}</td>
        <td class="p-4">
          <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm capitalize">
            ${user.role}
          </span>
        </td>
      </tr>
    `).join("")
    : `<tr><td colspan="5" class="p-6 text-center text-slate-500">No users found</td></tr>`;
}

function goDashboard() { window.location.href = "admin-dashboard.html"; }
function goUsers() { window.location.href = "users.html"; }
function goSlots() { window.location.href = "slots.html"; }
function goAddSlots() { window.location.href = "add-slots.html"; }
function goBookings() { window.location.href = "bookings.html"; }
function goPayments() { window.location.href = "payments.html"; }
function goReports() { window.location.href = "reports.html"; }
function logout() {
  localStorage.removeItem("admin");
  window.location.href = "admin-login.html";
}

window.onload = loadUsers;
</script>
</body>
</html>
