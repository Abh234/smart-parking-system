<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - ParkSmart</title>

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-gray-900 via-blue-900 to-gray-900 text-white">

  <!-- Main Container -->
  <div class="flex w-full max-w-4xl bg-gray-800 rounded-lg shadow-2xl overflow-hidden">

    <!-- Left Panel -->
    <div class="w-1/2 bg-blue-900 flex flex-col justify-center items-center p-10">
      <h1 class="text-4xl font-bold mb-4">ParkSmart</h1>
      <p class="text-gray-300 text-center">
        Reset your password securely and continue using Smart Parking 🚗
      </p>
    </div>

    <!-- Right Panel -->
    <div class="w-1/2 p-8">

      <h2 class="text-2xl font-semibold mb-6">
        <i class="fas fa-lock text-green-400 mr-2"></i> Reset Password
      </h2>

      <div class="space-y-5">

        <!-- Email -->
        <div>
          <label class="text-gray-400 text-sm">Email</label>
          <div class="flex items-center bg-gray-700 rounded px-3 py-2 mt-1">
            <i class="fas fa-envelope text-blue-400 mr-2"></i>
            <input type="email" id="email" placeholder="Enter your email"
              class="bg-transparent outline-none w-full text-white"/>
          </div>
        </div>

        <!-- New Password -->
        <div>
          <label class="text-gray-400 text-sm">New Password</label>
          <div class="flex items-center bg-gray-700 rounded px-3 py-2 mt-1">
            <i class="fas fa-key text-green-400 mr-2"></i>
            <input type="password" id="newPassword" placeholder="Enter new password"
              class="bg-transparent outline-none w-full text-white"/>
          </div>
        </div>

        <!-- Button -->
        <button onclick="resetPassword()"
          class="w-full bg-green-600 py-2 rounded font-semibold hover:bg-green-700 transition">
          Reset Password
        </button>

        <!-- Message -->
        <p id="message" class="text-sm"></p>

      </div>

      <!-- Back -->
      <p class="text-sm text-gray-400 mt-6">
        Back to 
        <a href="login.html" class="text-blue-400 hover:underline">Login</a>
      </p>

    </div>

  </div>

  <!-- JavaScript -->
  <script>
    async function resetPassword() {
      const email = document.getElementById("email").value;
      const newPassword = document.getElementById("newPassword").value;
      const message = document.getElementById("message");

      if (!email || !newPassword) {
        message.className = "text-red-400";
        message.innerText = "Please fill all fields";
        return;
      }

      try {
        const res = await fetch("http://127.0.0.1:5000/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, newPassword })
        });

        const data = await res.json();

        if (data.success) {
          message.className = "text-green-400";
          message.innerText = "Password reset successfully ✅";

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);

        } else {
          message.className = "text-red-400";
          message.innerText = "Reset failed ❌";
        }

      } catch (error) {
        message.className = "text-red-400";
        message.innerText = "Server error ❌";
      }
    }
  </script>

</body>
</html>
