<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - ParkSmart</title>

  <!-- Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-gray-900 via-blue-900 to-gray-900 text-white">

  <div class="flex w-full max-w-5xl bg-gray-800 rounded-lg shadow-2xl overflow-hidden">

    <!-- Left -->
    <div class="w-1/2 bg-blue-900 flex flex-col justify-center items-center p-10">
      <h1 class="text-4xl font-bold mb-4">ParkSmart</h1>
      <p class="text-gray-300 text-center">
        Create your account and start smart parking easily 🚗
      </p>
    </div>

    <!-- Right -->
    <div class="w-1/2 p-8">

      <h2 class="text-2xl font-semibold mb-6">
        <i class="fas fa-user-plus text-blue-400 mr-2"></i> Create Account
      </h2>

      <form class="space-y-5">

        <!-- Name -->
        <div>
          <label class="text-gray-400 text-sm">Full Name</label>
          <div class="flex items-center bg-gray-700 rounded px-3 py-2 mt-1">
            <i class="fas fa-user text-blue-400 mr-2"></i>
            <input type="text" id="name" placeholder="Enter Name"
              class="bg-transparent outline-none w-full text-white"/>
          </div>
        </div>

        <!-- Phone -->
        <div>
          <label class="text-gray-400 text-sm">Phone</label>
          <div class="flex items-center bg-gray-700 rounded px-3 py-2 mt-1">
            <i class="fas fa-phone text-blue-400 mr-2"></i>
            <input type="tel" id="phone" placeholder="Enter Phone"
              class="bg-transparent outline-none w-full text-white"/>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="text-gray-400 text-sm">Email</label>
          <div class="flex items-center bg-gray-700 rounded px-3 py-2 mt-1">
            <i class="fas fa-envelope text-blue-400 mr-2"></i>
            <input type="email" id="email" placeholder="Enter Email"
              class="bg-transparent outline-none w-full text-white"/>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-gray-400 text-sm">Password</label>
          <div class="flex items-center bg-gray-700 rounded px-3 py-2 mt-1">
            <i class="fas fa-lock text-blue-400 mr-2"></i>
            <input type="password" id="password" placeholder="Enter Password"
              class="bg-transparent outline-none w-full text-white"/>
          </div>
        </div>

        <!-- Role -->
        

        <!-- Register Button -->
        <button type="button" onclick="register()"
          class="w-full bg-blue-600 py-2 rounded font-semibold hover:bg-blue-700 transition">
          Register
        </button>

      </form>

      <p class="text-sm text-gray-400 mt-4">
        Already have an account?
        <a href="./admin-login.html" class="text-blue-400 hover:underline">Login</a>
      </p>

    </div>
  </div>

  <!-- JS -->
  <!-- SAME UI (NO CHANGE) -->
<script>
async function register() {

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !phone || !email || !password) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("http://127.0.0.1:5000/api/admin/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, phone, email, password })
    });

    const data = await res.json();

    console.log(data); // 🔍 DEBUG

    if (data.success) {
      alert("Admin Registered ✅");
      window.location.href = "admin-login.html";
    } else {
      alert(data.message || data.error);
    }

  } catch (err) {
    console.error(err);
    alert("Server Error ❌ (Check Flask running)");
  }
}
</script>

</body>
</html>
